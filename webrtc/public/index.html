<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>chattr &mdash; video call</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <h1>chattr</h1>
    <p>Private video calls. No account needed.</p>
    <label for="room-input">Room name</label>
    <input id="room-input" type="text" placeholder="e.g. team-meeting" autocomplete="off" />
    <button class="btn" onclick="joinRoom()">Join room</button>
    <div class="lobby-foot"><span>&#9679;</span> Peer-to-peer &middot; Encrypted</div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <strong>chattr</strong>
      <span class="room-tag" id="room-tag">room</span>
    </div>
    <div class="topbar-right">
      <div class="conn-badge">
        <span class="dot busy" id="conn-dot"></span>
        <span id="conn-label">Connecting</span>
      </div>
      <button class="topbar-btn" id="chat-btn" onclick="toggleChat()">💬 Chat</button>
      <button class="topbar-btn leave" onclick="leaveRoom()">✕ Leave</button>
    </div>
  </div>

  <div class="main">
    <div class="video-area">
      <div class="video-grid" id="video-grid">
        <div class="video-box" id="local-box">
          <video id="local-video" autoplay playsinline muted></video>
          <div class="ph" id="local-ph">
            <div class="av" id="local-av">Y</div>
            <span>You</span>
          </div>
          <div class="tag">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
            <span id="local-tag">You</span>
          </div>
        </div>
        <div class="video-box" id="remote-box">
          <video id="remote-video" autoplay playsinline></video>
          <div class="ph" id="remote-ph">
            <div class="av" id="remote-av">?</div>
            <span id="remote-label">Waiting for someone</span>
          </div>
          <div class="tag">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
            <span id="remote-tag">Peer</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="c-mic" onclick="toggleAudio()" title="Toggle mic">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="c-cam" onclick="toggleVideo()" title="Toggle camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
        <button class="ctrl-btn" id="c-screen" onclick="toggleScreenShare()" title="Share screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
        </button>
        <div class="ctrl-divider"></div>
        <button class="ctrl-btn end" onclick="leaveRoom()" title="End call">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.8 12.8 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.8 12.8 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </button>
      </div>

    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h3>Chat</h3>
        <button onclick="toggleChat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="chat-msgs" id="chat-msgs">
        <div class="empty">No messages yet.</div>
      </div>
      <div class="chat-input-row">
        <input id="chat-inp" type="text" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMsg()" />
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
